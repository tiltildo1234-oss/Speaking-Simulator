kind = "web"
previewPath = "/"
title = "IELTS Speaking Simulator"
version = "1.0.0"
id = "artifacts/ielts-simulator"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20622

[services.development]
run = "pnpm --filter @workspace/ielts-simulator run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ielts-simulator", "run", "build" ]
publicDir = "artifacts/ielts-simulator/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20622"
BASE_PATH = "/"
